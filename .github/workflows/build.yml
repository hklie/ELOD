name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller elod.spec

      - name: Prepare release package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/elod
          Copy-Item dist/elod.exe release/elod/
          Copy-Item INSTRUCCIONES.md release/elod/
          Copy-Item scripts/run_elod.bat release/elod/

          # Copy example data (includes a sample tournament users can run immediately)
          Copy-Item -Recurse examples/data release/elod/
          New-Item -ItemType Directory -Force -Path release/elod/output

          Compress-Archive -Path release/elod -DestinationPath release/elod-windows-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/elod-windows-${{ github.ref_name }}.zip
          generate_release_notes: true
